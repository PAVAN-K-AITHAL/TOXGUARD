# ToxGuard Environment
# Install with: conda env create -f environment.yml
# Or manually: pip install -r requirements.txt

name: toxguard
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - pytorch>=1.13.0
  - torchvision
  - torchaudio
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scikit-learn>=1.0.0
  - pip
  - pip:
    - transformers>=4.25.0
    - pytorch-lightning>=1.9.0
    - torchmetrics>=0.11.0
    - sentencepiece>=0.1.96
    - protobuf<=3.20.3
    - deepchem>=2.7.0
    - pubchempy>=1.0.4
    - rdkit-pypi>=2022.9.0
    - tensorboard>=2.11.0
    - rich>=13.0.0
    - tqdm>=4.64.0
